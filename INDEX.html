<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haier - Application Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
        }
        header {
            width: 100%;
            height: 60px;
            background-color: #fff;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        header img {
            height: 40px;
        }
        .content {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 60px);
        }
        .form-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 320px;
        }
        input, select, button {
            padding: 10px;
            margin: 8px 0;
            width: 90%;
            font-size: 16px;
        }
        button {
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        .note {
            font-size: 12px;
            color: #555;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<header>
    <!-- Haier Logo on top right -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e1/Haier_logo.svg/2560px-Haier_logo.svg.png" alt="Haier Logo">
</header>

<div class="content">
    <div class="form-container">
        <h2>Application Form</h2>
        <input type="text" id="name" placeholder="Enter your name" required><br>
        <input type="email" id="email" placeholder="Enter your email" required><br>

        <label for="qualification">Qualification:</label><br>
        <select id="qualification" required>
            <option value="">Select Qualification</option>
            <option value="highschool">High School</option>
            <option value="bachelor">Bachelor's</option>
            <option value="master">Master's</option>
            <option value="other">Other</option>
        </select><br>

        <input type="text" id="easypaisa" placeholder="Enter Easypaisa number" required><br>
        <button onclick="submitApplication()">Submit Application</button>
        <p class="note">* Easypaisa number is mandatory.<br>
           For more information dial <strong>03132177060</strong></p>
    </div>
</div>

<script>
function submitApplication() {
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const qualification = document.getElementById('qualification').value;
    const easypaisa = document.getElementById('easypaisa').value;

    if(name && email && qualification && easypaisa) {
        window.location.href = "haier_submitted.html";
    } else {
        alert("Please fill in all required fields, including Easypaisa number and Qualification.");
    }
}
</script>

</body>
</html>
