<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haier - Application Form</title>
    <style>
        /* Haier-style theme */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #0072bc; /* Haier Blue */
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 18px;
            margin: 0;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }

        .form-box {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .form-box h2 {
            text-align: center;
            color: #0072bc;
            margin-bottom: 20px;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        select {
            background-color: #fff;
        }

        button {
            background-color: #0072bc;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #005b99;
        }

        .note {
            font-size: 12px;
            color: #555;
            margin-top: 10px;
        }

        .success-message {
            text-align: center;
            color: green;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<header>
    <h1>Haier</h1>
</header>

<div class="container">
    <div class="form-box">
        <h2>Application Form</h2>

        <input type="text" id="name" placeholder="Enter your name" required>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label for="qualification">Qualification:</label>
        <select id="qualification" required>
            <option value="">Select Qualification</option>
            <option value="bachelors">Bachelors</option>
            <option value="matric">Matric</option>
        </select>

        <input type="text" id="easypaisa" placeholder="Enter Easypaisa number" required>

        <p class="note">
            * Easypaisa number and WhatsApp number are required.<br>
            * You should have computer skills to apply this form.<br>
            For more information dial <strong>03132177060</strong>
        </p>

        <button onclick="submitForm()">Submit Application</button>

        <p class="success-message" id="successMessage" style="display: none;">Application Sent!</p>
    </div>
</div>

<script>
function submitForm() {
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const qualification = document.getElementById('qualification').value;
    const easypaisa = document.getElementById('easypaisa').value;

    if(name && email && qualification && easypaisa) {
        // Show success message in green
        document.getElementById('successMessage').style.display = 'block';
    } else {
        alert("Please fill in all required fields including Easypaisa number and Qualification.");
    }
}
</script>

</body>
</html>
