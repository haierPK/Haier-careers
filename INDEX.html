<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
        }
        .form-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 320px;
        }
        input, select, button {
            padding: 10px;
            margin: 8px 0;
            width: 90%;
            font-size: 16px;
        }
        button {
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        .note {
            font-size: 12px;
            color: #555;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Application Form</h2>
    <input type="text" id="name" placeholder="Enter your name" required><br>
    <input type="email" id="email" placeholder="Enter your email" required><br>

    <label for="qualification">Qualification:</label><br>
    <select id="qualification" required>
        <option value="">Select Qualification</option>
        <option value="highschool">High School</option>
        <option value="bachelor">Bachelor's</option>
        <option value="master">Master's</option>
        <option value="other">Other</option>
    </select><br>

    <input type="text" id="easypaisa" placeholder="Enter Easypaisa number" required><br>
    <button onclick="submitApplication()">Submit Application</button>
    <p class="note">* Easypaisa number is mandatory.<br>
       For more information dial <strong>03132177060</strong></p>
</div>

<script>
function submitApplication() {
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const qualification = document.getElementById('qualification').value;
    const easypaisa = document.getElementById('easypaisa').value;

    if(name && email && qualification && easypaisa) {
        window.location.href = "submitted.html";
    } else {
        alert("Please fill in all required fields, including Easypaisa number and Qualification.");
    }
}
</script>

</body>
</html>
